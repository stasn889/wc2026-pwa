<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>רשימות</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── מסך: רשימות ── -->
  <div id="screen-lists">
    <header class="app-header">
      <h1>הרשימות שלי</h1>
      <button id="btn-new-list" title="רשימה חדשה">+</button>
    </header>
    <div id="lists-grid"></div>
  </div>

  <!-- ── מסך: משימות ── -->
  <div id="screen-tasks" hidden>
    <header class="app-header tasks-header" id="tasks-header">
      <button id="btn-back" class="btn-back">&#8592;</button>
      <span id="tasks-list-icon" class="tasks-list-icon"></span>
      <h2 id="tasks-list-name"></h2>
    </header>
    <div id="tasks-body">
      <div class="add-task">
        <input type="text" id="task-input" placeholder="הוסף משימה..." autocomplete="off" />
        <button id="btn-add-task">הוסף</button>
      </div>
      <ul id="task-list"></ul>
      <div id="tasks-done-bar"></div>
    </div>
  </div>

  <!-- ── מודל: רשימה חדשה ── -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h3>רשימה חדשה</h3>
      <input type="text" id="modal-name-input" placeholder="שם הרשימה..." />
      <div class="modal-section-label">צבע</div>
      <div id="color-picker" class="color-picker"></div>
      <div class="modal-section-label">סמל</div>
      <div id="icon-picker" class="icon-picker"></div>
      <div class="modal-actions">
        <button id="modal-confirm" class="btn-primary">צור רשימה</button>
        <button id="modal-cancel" class="btn-secondary">ביטול</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
